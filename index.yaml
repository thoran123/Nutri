      summary: Trigger a simulated error for testing error logging
      description: 'This endpoint intentionally triggers an error so you can test
        the error logging middleware and verify entries are written to the Supabase
        `error_logs` table.

        Use the `simulate` field in the request body to choose the behavior: `throw`
        (synchronous throw), `next` (pass to next), or omit for a delayed async error.'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                simulate:
                  type: string
                  example: throw
                  description: 'Options: "throw", "next" or omitted (delayed error)'
      responses:
        '200':
          description: If the request unexpectedly succeeds
