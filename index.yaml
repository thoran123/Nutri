    get:
      summary: Calculate BMI and recommended daily water intake
      description: 'Calculates Body Mass Index (BMI) based on height and weight, and
        returns a recommended daily water intake value.

        '
      tags:
      - Health Tools
      parameters:
      - name: height
        in: query
        required: true
        description: Height in meters (e.g. 1.75)
        schema:
          type: number
          format: float
          example: 1.75
      - name: weight
        in: query
        required: true
        description: Weight in kilograms (e.g. 70)
        schema:
          type: number
          format: float
          example: 70
      responses:
        '200':
          description: BMI and water intake calculated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  bmi:
                    type: number
                    format: float
                    example: 22.86
                  recommendedWaterIntakeMl:
                    type: number
                    example: 2450
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid parameters. Height and weight must be positive
                      numbers.
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Internal server error
  /recipe/nutritionlog:
    get:
      summary: Get full nutrition info for a recipe by name
      description: Returns nutritional values of a recipe based on recipe_name
      parameters:
      - in: query
        name: name
        schema:
          type: string
        required: true
        description: The name of the recipe to search (case-insensitive)
      responses:
        '200':
          description: Nutritional info returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  recipe_name:
                    type: string
                  calories:
                    type: number
                  fat:
                    type: number
                  carbohydrates:
                    type: number
                  protein:
                    type: number
                  fiber:
                    type: number
                  vitamin_a:
                    type: number
                  vitamin_b:
                    type: number
                  vitamin_c:
                    type: number
                  vitamin_d:
                    type: number
                  sodium:
                    type: number
                  sugar:
                    type: number
        '400':
          description: Missing recipe name query parameter
        '404':
          description: Recipe not found
        '500':
          description: Internal server error
  /water-intake:
    post:
      summary: Update the number of glasses of water consumed
      description: Upserts the current day's water intake for the supplied user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                  description: The unique ID of the user
                glasses_consumed:
                  type: integer
                  description: Number of glasses consumed
              required:
              - user_id
              - glasses_consumed
            example:
              user_id: 15
              glasses_consumed: 5
      responses:
        '200':
          description: Water intake updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WaterIntakeUpdateResponse'
        '400':
          description: Bad request - missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /chatbot/history:
    post:
      summary: Get chat history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserIdRequest'
      responses:
        '200':
          description: Chat history retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatHistoryResponse'
        '400':
          description: Missing required user id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No chat history found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
    delete:
      summary: Clear chat history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserIdRequest'
      responses:
        '200':
          description: Chat history cleared successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '400':
          description: Missing required user id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
  /medical-report/retrieve:
    post:
      summary: Retrieve AI medical report
      description: Normalizes survey-style input, forwards it to the AI retrieve service, and returns the generated `medical_report`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedicalReportRequest'
      responses:
        '200':
          description: Medical report retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalReportRetrieveResponse'
        '400':
          description: Bad request or AI returned no medical report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Upstream AI retrieve error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /medical-report/plan:
    post:
      summary: Generate weekly health plan from a medical report
      description: Builds a plan-generation payload from `medical_report` and `survey_data`, then returns the AI weekly plan without persisting it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HealthPlanRequest'
            examples:
              fe_combined_payload:
                value:
                  medical_report:
                  - obesity_prediction:
                      obesity_level: Overweight_Level_II
                      confidence: 79.8
                    diabetes_prediction:
                      diabetes: true
                      confidence: 79.8
                  survey_data:
                    Gender: Male
                    Age: 24
                    Height: 1.699998
                    Weight: 81.66995
                    Any family history of overweight (yes/no): 'yes'
                    Frequent High Calorie Food Consumption (yes/no): 'yes'
                    Consumption of vegetables in meals: 2.7
                    Consumption of Food Between Meals: Sometimes
                    Number of Main Meals: 3
                    Daily Water Intake: 2.763573
                    Do you Smoke?: 'no'
                    Do you monitor your daily calories?: 'no'
                    Physical Activity Frequency: 0
                    Time Using Technology Devices Daily: 0.976473
                    Alcohol Consumption Rate: Sometimes
                    Mode of Transportation you use: Public_Transportation
                    target_weight: 80
                    days_per_week: 4
                    workout_place: gym
              minimal:
                value:
                  medical_report:
                  - obesity_prediction:
                      obesity_level: Overweight_Level_I
                      confidence: 82.3
                    diabetes_prediction:
                      diabetes: false
                      confidence: 91.2
                  survey_data:
                    Gender: Male
                    Age: 29
                    Height: 1.78
                    Weight: 78.5
                    days_per_week: 4
                    workout_place: gym
      responses:
        '200':
          description: Weekly plan generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthPlanResponse'
        '400':
          description: Bad request - missing medical report, survey data, or invalid health goal fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: AI returned no weekly plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Upstream AI plan generation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/register:
    post:
      tags:
      - Authentication
      summary: User Registration
      description: Create a new user account and return the shared response envelope used by all first-party clients.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - email
              - password
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  format: email
                  example: john@nutrihelp.com
                password:
                  type: string
                  minLength: 6
                  example: SecurePassword123!
                first_name:
                  type: string
                  example: John
                last_name:
                  type: string
                  example: Doe
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRegisterEnvelope'
        '400':
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /auth/login:
    post:
      tags:
      - Authentication
      summary: User Login
      description: Login user and get access/refresh tokens in a stable envelope for web and mobile clients.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionEnvelope'
        '400':
          description: Missing email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Login failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /auth/refresh:
    post:
      tags:
      - Authentication
      summary: Refresh Access Token
      description: Get new access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: b9b1f1235fb056bc4389...
      responses:
        '200':
          description: Token refresh successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRefreshEnvelope'
        '400':
          description: Missing refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /auth/logout:
    post:
      tags:
      - Authentication
      summary: User Logout
      description: Invalidate refresh token and logout user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  example: b9b1f1235fb056bc4389...
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericEnvelopeWithMessage'
        '400':
          description: Missing refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '500':
          description: Logout failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /auth/health:
    get:
      tags:
      - Authentication
      summary: Auth Service Health Check
      description: Check if authentication service is running
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Auth service is running
                  timestamp:
                    type: string
                    format: date-time
                    example: '2025-08-03T12:14:00.706Z'
  /barcode:
    post:
      summary: Detect user allergen from a given barcode
      description: |
        Retrieves barcode product information and optionally compares parsed ingredients against the supplied user's allergen ingredients.
        When `user_id` is omitted, the endpoint returns product information only.
      parameters:
      - name: code
        in: query
        required: true
        schema:
          type: integer
        description: Barcode number for allergen detection
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                  description: The user ID
              required:
              - user_id
      responses:
        '200':
          description: Barcode scanning successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BarcodeAllergenDetection'
        '404':
          description: Invalid barcode or product information not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/events/export:
    get:
      tags:
      - Security
      summary: Export security events as JSON or CSV
      description: 'Aggregates login, brute-force and session/token lifecycle events
        from auth_logs, brute_force_logs and user_session into a unified export.

        '
      parameters:
      - name: from
        in: query
        description: Start date (YYYY-MM-DD). Defaults to 7 days before `to`.
        required: false
        schema:
          type: string
          format: date
      - name: to
        in: query
        description: End date (YYYY-MM-DD). Defaults to now.
        required: false
        schema:
          type: string
          format: date
      - name: format
        in: query
        description: Response format. Use `csv` to download CSV, otherwise JSON.
        required: false
        schema:
          type: string
          enum:
          - json
          - csv
      responses:
        '200':
          description: Security events exported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityEventsExportResponse'
            text/csv:
              schema:
                type: string
              example: "event_id,event_type,source,timestamp\nbrute_4092,BRUTE_FORCE_DETECTED,public.brute_force_logs,2025-12-04T09:30:00.000Z"
        '500':
          description: Failed to export security events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AllergyCheckRequest:
      type: object
      required:
      - userAllergies
      - meal
      properties:
        userAllergies:
          type: array
          description: List of allergens the user is sensitive to (lowercase recommended)
          items:
            type: string
          example:
          - peanuts
          - milk
          - sesame
        meal:
          type: object
          required:
          - name
          - ingredients
          properties:
            name:
              type: string
              example: Chicken Satay
            ingredients:
              type: array
              items:
                type: string
              example:
              - chicken
              - peanut sauce
              - soy sauce
              - garlic
    AllergyCheckResponse:
      type: object
      properties:
        hasAllergens:
          type: boolean
          example: true
        triggers:
          type: array
          description: Which of the userAllergies were detected in the meal ingredients
          items:
            type: string
          example:
          - peanuts
          - soy
    Kpi24h:
      type: object
      properties:
        login_events_24h:
          type: integer
          example: 512
        successes_24h:
          type: integer
          example: 420
        failures_24h:
          type: integer
          example: 92
        success_rate_24h:
          type: number
          format: float
          example: 82.03
    DailyRow:
      type: object
      properties:
        day_local:
          type: string
          format: date
          example: '2025-08-26'
        attempts:
          type: integer
          example: 150
