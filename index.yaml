      - FAVC
      - FCVC
      - NCP
      - CAEC
      - SMOKE
      - CH2O
      - SCC
      - FAF
      - TUE
      - CALC
      - MTRANS
      properties:
        Gender:
          type: string
          description: Gender value accepted by the normalization helper.
          example: Male
        Age:
          type: number
          format: int
          description: Age in years.
          example: 24
        Height:
          type: number
          format: float
          description: Height in meters.
          example: 1.699998
        Weight:
          type: number
          format: float
          description: Weight in kilograms.
          example: 81.66995
        family_history_with_overweight:
          type: string
          enum:
          - 'yes'
          - 'no'
          description: Indicates if there is a family history of being overweight.
          example: 'yes'
        FAVC:
          oneOf:
          - type: integer
          - type: string
          description: High-calorie food consumption flag accepted by `to01Int`.
          example: 1
        FCVC:
          type: number
          format: float
          description: Frequency of vegetable consumption in meals.
          example: 3
        NCP:
          type: number
          format: float
          description: Number of main meals per day.
          example: 3
        CAEC:
          type: integer
          enum:
          - 0
          - 1
          - 2
          - 3
          description: Encoded frequency of consuming food between meals.
          example: 1
        SMOKE:
          oneOf:
          - type: integer
          - type: string
          description: Smoking flag accepted by `to01Int`.
          example: 0
        CH2O:
          type: number
          format: float
          description: Daily water intake in liters.
          example: 2.763573
        SCC:
          type: string
          enum:
          - 'yes'
          - 'no'
          description: Whether the user monitors daily calories.
          example: 'no'
        FAF:
          type: number
          format: float
          description: Frequency of physical activity per week.
          example: 0
        TUE:
          type: number
          format: float
          description: Time spent using technological devices daily (in hours).
          example: 0.976473
        CALC:
          type: integer
          enum:
          - 0
          - 1
          - 2
          description: Encoded alcohol consumption rate.
          example: 1
        MTRANS:
          type: string
          enum:
          - Automobile
          - Motorbike
          - Bike
          - Public_Transportation
          - Walking
          description: Common mode of transportation used.
          example: Public_Transportation
