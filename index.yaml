openapi: 3.0.0
info:
  title: NutriHelp API
  version: 1.0.0
servers:
- url: http://localhost:8081/api
  description: Local development (HTTP fallback — no certs)
- url: https://localhost:8443/api
  description: Local development (TLS 1.3)
tags:
- name: System
  description: System and security monitoring endpoints
- name: LoginDashboard
  description: KPIs and trends from public.audit_logs
- name: Allergy
  description: Endpoints for allergy checks and warnings
- name: Appointments
  description: Appointments relevant API
- name: Home Service
  description: Home Service API
- name: Auth
  description: Authentication and user session endpoints
paths:
  /account:
    get:
      tags:
      - Auth
      summary: Get account info
      responses:
        '200':
          description: Account data returned
  /userpassword:
    put:
      tags:
      - Auth
      summary: Update user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Password updated
  /userprofile/update-by-identifier:
    put:
      tags:
      - Auth
      summary: Update user profile by identifier (admin)
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Profile updated
  /auth/logout-all:
    post:
      tags:
      - Auth
      summary: Logout from all devices
      description: Invalidates all refresh sessions for the authenticated user.
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Logged out from all sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericEnvelopeWithMessage'
        '400':
          description: Missing authenticated user context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '500':
          description: Logout all failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /auth/dashboard:
    get:
      tags:
      - Auth
      summary: Get auth dashboard data
      description: Lightweight authenticated check that returns the current user's identity and role.
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Dashboard data returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthDashboardResponse'
        '401':
          description: Unauthorized
  /recipe/createRecipe:
    post:
      tags:
      - Recipe
      summary: Create a new recipe
      description: Creates and saves a user-owned recipe. Returns a simple success payload on completion.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecipeRequest'
      responses:
        '201':
          description: Recipe created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyMutationResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpressValidationErrorArray'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /recipe/scale/{recipe_id}/{desired_servings}:
    get:
      tags:
      - Recipe
      summary: Scale a recipe to desired servings
      parameters:
      - name: recipe_id
        in: path
        required: true
        schema:
          type: string
      - name: desired_servings
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Scaled recipe returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeScaleResponse'
        '4XX':
          description: Invalid recipe id or servings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /fooddata/mealplan:
    get:
      tags:
      - FoodData
      summary: Get meal plan food data
      responses:
        '200':
          description: Meal plan food data returned
  /chatbot/query:
    post:
      tags:
      - Chatbot
      summary: Query the chatbot
      description: Submit `user_id` and `user_input`, persist the exchange in chat history, and return the chatbot reply.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatbotQueryRequest'
      responses:
        '200':
          description: Chatbot response returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatbotQueryResponse'
        '400':
          description: Missing or invalid chatbot input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /chatbot/add_urls:
    post:
      tags:
      - Chatbot
      summary: Add URLs to chatbot knowledge base
      description: Sends one or more URLs to the AI chatbot ingestion endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                urls:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: URLs added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatbotMutationResponse'
        '400':
          description: Missing or invalid URL payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: AI server unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /chatbot/add_pdfs:
    post:
      tags:
      - Chatbot
      summary: Add PDFs to chatbot knowledge base
      description: Placeholder endpoint that currently accepts a JSON `pdfs` payload and returns a dummy success response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pdfs:
                  oneOf:
                  - type: string
                  - type: array
                    items:
                      type: string
      responses:
        '200':
          description: PDFs added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatbotMutationResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /articles:
    get:
      tags:
      - Articles
      summary: Search health articles
      description: Returns health articles for the required `query` term.
      parameters:
      - name: query
        in: query
        required: true
        description: Search keyword used by the article lookup model.
        schema:
          type: string
      responses:
        '200':
          description: Matching articles returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleSearchResponse'
        '400':
          description: Missing query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /shopping-list/items:
    post:
      tags:
      - ShoppingList
      summary: Add item to shopping list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                quantity:
                  type: integer
      responses:
        '201':
          description: Item added to shopping list
  /login:
    post:
      summary: User login
      description: |
        Legacy login endpoint for web clients.
        On success it returns `{ user, token }`.
        If MFA is enabled it returns `202` with a message.
        Repeated failures may return `429`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful, JWT token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyLoginSuccessResponse'
        '202':
          description: MFA token sent to the user's email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '400':
          description: Email and password are required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many login attempts or lockout warning
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /signup:
    post:
      summary: User signup
      description: |
        Legacy signup endpoint for web clients.
        Returns a simple success message on creation.
        Validation middleware may also return an `errors` array.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation failed, weak password, or user already exists
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/ErrorResponse'
                - $ref: '#/components/schemas/ValidationErrorsResponse'
                - $ref: '#/components/schemas/SignupWeakPasswordResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/profile:
    get:
      tags:
      - Authentication
      summary: Get User Profile
      description: Returns the authenticated user's profile in the shared response envelope used by web and mobile clients.
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileEnvelope'
        '401':
          description: Unauthorized
        '404':
          description: User not found
  /allergy/common:
    get:
      tags:
      - Allergy
      summary: Get common allergens list
      description: Returns an array of common allergens to help build UI pickers.
      responses:
        '200':
          description: List of common allergens
          content:
            application/json:
              schema:
                type: object
                properties:
                  allergens:
                    type: array
                    items:
                      type: string
              examples:
                default:
                  value:
                    allergens:
                    - peanuts
                    - tree nuts
                    - milk
                    - eggs
                    - soy
                    - wheat
                    - fish
                    - shellfish
                    - sesame
  /allergy/check:
    post:
      tags:
      - Allergy
      summary: Check a meal against user allergies
      description: Returns which of the user's allergies are present in the meal's
        ingredients.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AllergyCheckRequest'
            examples:
              simple:
                value:
                  userAllergies:
                  - peanuts
                  - milk
                  meal:
                    name: PB&J with milk
                    ingredients:
                    - bread
                    - peanut butter
                    - jelly
                    - milk
      responses:
        '200':
          description: Allergy check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllergyCheckResponse'
  /system/generate-baseline:
    post:
      tags:
      - System
      summary: Regenerate baseline hash data for file integrity checks
      description: Re-creates the baseline.json file to update file integrity data.
      responses:
        '200':
          description: Baseline regenerated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Baseline regenerated successfully
                  fileCount:
                    type: integer
                    example: 4
        '500':
          description: Server error while regenerating baseline
  /system/integrity-check:
    get:
      tags:
      - System
      summary: Run file integrity and anomaly check
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  anomalies:
                    type: array
                    items:
                      type: object
                      properties:
                        file:
                          type: string
                        issue:
                          type: string
  /login-dashboard/kpi:
    get:
      tags:
      - LoginDashboard
      summary: 24h login KPIs
      responses:
        '200':
          description: KPIs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Kpi24h'
  /login-dashboard/daily:
    get:
      tags:
      - LoginDashboard
      summary: Daily attempts/success/failure
      parameters:
      - in: query
        name: days
        schema:
          type: integer
          minimum: 1
          default: 30
      responses:
        '200':
          description: Time series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyRow'
  /login-dashboard/dau:
    get:
      tags:
      - LoginDashboard
      summary: Daily Active Users (successful unique logins)
      parameters:
      - in: query
        name: days
        schema:
          type: integer
          minimum: 1
          default: 30
      responses:
        '200':
          description: DAU time series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DauRow'
  /login-dashboard/top-failing-ips:
    get:
      tags:
      - LoginDashboard
      summary: Top failing IPs (7 days)
      responses:
        '200':
          description: Suspicious IPs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FailingIpRow'
  /login-dashboard/fail-by-domain:
    get:
      tags:
      - LoginDashboard
      summary: Failures grouped by email domain (7 days)
      responses:
        '200':
          description: Failure counts by domain
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DomainFailRow'
  /upload:
    post:
      summary: Upload a file
      description: Upload JPG, PNG, or PDF (max 5MB). Requires bearer token, `user_id`, and a multipart `file` field.
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                user_id:
                  type: integer
              required:
              - file
              - user_id
      responses:
        '201':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '400':
          description: Upload failed due to size/type restriction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing authorization token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many uploads from this IP (rate limit exceeded)
        '500':
          description: File upload failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /home/services:
    get:
      tags:
      - Home Service
      summary: Get all service contents
      description: Returns a list of all nutrihelp services.
      responses:
        '200':
          description: Service list
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Service'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
      - Home Service
      summary: Create a new service
      description: Create a new nutrition help service.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCreate'
      responses:
        '201':
          description: Service created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Service'
        '400':
          description: Bad request
        '500':
          description: Internal server error
  /home/services/{id}:
    put:
      tags:
      - Home Service
      summary: Update a service
      description: Update an existing nutrition help service by ID.
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceUpdate'
      responses:
        '200':
          description: Service updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Service'
        '404':
          description: Service not found
        '500':
          description: Internal server error
    delete:
      tags:
      - Home Service
      summary: Delete a service
      description: Delete a nutrition help service by ID.
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Service deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Service not found
        '500':
          description: Internal server error
  /home/services/page:
    get:
      tags:
      - Home Service
      summary: Get paginated service contents
      description: Returns paginated nutrihelp services with optional search and online
        filter.
      parameters:
      - in: query
        name: page
        schema:
          type: integer
          default: 1
        description: Page number
      - in: query
        name: pageSize
        schema:
          type: integer
          default: 10
        description: Number of items per page
      - in: query
        name: search
        schema:
          type: string
        description: Search by title or description
      - in: query
        name: online
        schema:
          type: boolean
        description: Filter only online services
      responses:
        '200':
          description: Paginated service list
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  total:
                    type: integer
                  totalPages:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Service'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /home/subscribe:
    post:
      tags:
      - Home Subscribe
      summary: Subscribe newsletter
      description: User subscribe newsletter.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeNewsletter'
      responses:
        '201':
          description: Subscribe created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/SubscribeNewsletter'
        '400':
          description: Bad request
        '500':
          description: Internal server error
  /appointments:
    get:
      summary: Retrieve all appointment data
      description: Returns a JSON array containing all appointments.
      responses:
        '200':
          description: Appointments fetched successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
      - Appointments
      summary: Save appointment data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Appointment'
      responses:
        '201':
          description: Appointment saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad request - missing required fields
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/ErrorResponse'
                - $ref: '#/components/schemas/ExpressValidationErrorArray'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /appointments/v2:
    post:
      tags:
      - Appointments
      summary: Save appointment data version 2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentV2'
      responses:
        '201':
          description: Appointment saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad request - missing required fields
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/ErrorResponse'
                - $ref: '#/components/schemas/ExpressValidationErrorArray'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
      - Appointments
      summary: Get all appointments for the current user
      parameters:
      - in: query
        name: page
        schema:
          type: integer
          default: 1
          minimum: 1
        description: Page number (default is 1)
      - in: query
        name: pageSize
        schema:
          type: integer
          default: 10
          minimum: 1
        description: Number of appointments per page (default is 10)
      - in: query
        name: search
        schema:
          type: string
        description: Optional search keyword to match title, doctor, or type
      responses:
        '200':
          description: List of appointments with pagination info
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                    example: 1
                  pageSize:
                    type: integer
                    example: 10
                  total:
                    type: integer
                    example: 23
                  totalPages:
                    type: integer
                    example: 3
                  appointments:
                    type: array
                    items:
                      $ref: '#/components/schemas/AppointmentV2'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /appointments/v2/{id}:
    put:
      tags:
      - Appointments
      summary: Update an appointment (version 2)
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: Appointment ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentUpdate'
      responses:
        '200':
          description: Appointment updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Appointment updated successfully
                  appointment:
                    $ref: '#/components/schemas/AppointmentUpdate'
        '400':
          description: Bad request - invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Appointment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Appointments
      summary: Delete an appointment (version 2)
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: Appointment ID
      responses:
        '200':
          description: Appointment deleted successfully
          content:
            application/json:
