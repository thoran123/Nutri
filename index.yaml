  /health-news:
    get:
      summary: Query health news and related reference data
      description: |
        Flexible health news endpoint.
        By default it filters articles and returns `{ success, data, pagination }`.
        Query parameters can switch behavior to fetch by id, category, author, tag, or list categories/authors/tags.
      parameters:
      - name: action
        in: query
        required: false
        description: |
          Action to perform (optional - API will auto-detect based on provided parameters):
            - "filter" (default): Filter health news articles using flexible criteria
            - "getById": Get specific health news by ID (requires id parameter)
            - "getByCategory": Get news by category (requires categoryId parameter)
            - "getByAuthor": Get news by author (requires authorId parameter)
            - "getByTag": Get news by tag (requires tagId parameter)
            - "getAllCategories": Get all categories
            - "getAllAuthors": Get all authors
            - "getAllTags": Get all tags
        schema:
          type: string
          enum:
          - filter
          - getAll
          - getById
          - getByCategory
          - getByAuthor
          - getByTag
          - getAllCategories
          - getAllAuthors
          - getAllTags
          default: filter
      - name: id
        in: query
        required: false
        description: Health news ID
        schema:
          type: string
          format: uuid
      - name: categoryId
        in: query
        required: false
        description: Category ID
        schema:
          type: string
          format: uuid
      - name: authorId
        in: query
        required: false
        description: Author ID
        schema:
          type: string
          format: uuid
      - name: tagId
        in: query
        required: false
        description: Tag ID
        schema:
          type: string
          format: uuid
      - name: title
        in: query
        required: false
        description: Filter news by title (partial match)
        schema:
          type: string
      - name: content
        in: query
        required: false
        description: Filter news by content (partial match)
        schema:
          type: string
      - name: author_name
        in: query
        required: false
        description: Filter news by author name (partial match)
        schema:
          type: string
      - name: category_name
        in: query
        required: false
        description: Filter news by category name (partial match)
        schema:
          type: string
      - name: tag_name
        in: query
        required: false
        description: Filter news by tag name (partial match)
        schema:
          type: string
      - name: start_date
        in: query
        required: false
        description: Filter news published on or after this date (ISO format)
        schema:
          type: string
          format: date-time
      - name: end_date
        in: query
        required: false
        description: Filter news published on or before this date (ISO format)
        schema:
          type: string
          format: date-time
      - name: sort_by
        in: query
        required: false
        description: Field to sort by
        schema:
          type: string
          default: published_at
      - name: sort_order
        in: query
        required: false
        description: Sort order
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: limit
        in: query
        required: false
        description: Number of records to return
        schema:
          type: integer
          default: 20
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
      - name: include_details
        in: query
        required: false
        description: Whether to include full relationship details
        schema:
          type: string
          enum:
          - true
          - false
          default: true
      responses:
        '200':
          description: Calculate cost successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstimatedCost'
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    oneOf:
                    - type: array
                      items:
                        $ref: '#/components/schemas/HealthNews'
                    - $ref: '#/components/schemas/HealthNews'
                    - type: array
                      items:
                        $ref: '#/components/schemas/Category'
                    - type: array
                      items:
                        $ref: '#/components/schemas/Author'
                    - type: array
                      items:
                        $ref: '#/components/schemas/Tag'
                  pagination:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 48
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 20
                      total_pages:
                        type: integer
                        example: 3
