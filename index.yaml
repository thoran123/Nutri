            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /notifications:
    get:
      summary: Get notifications for the authenticated user
      description: |
        Returns the current user's notifications in the shared response envelope.
        This is the preferred endpoint for frontend and mobile clients because it avoids having to pass the user ID in the URL.
      security:
      - BearerAuth: []
      parameters:
      - in: query
        name: status
        required: false
        schema:
          type: string
          enum:
          - read
          - unread
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
      responses:
        200:
          description: Notification list returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListEnvelope'
        401:
          description: Unauthorized
        500:
          description: Internal Server Error
    post:
      summary: Create a new notification
      description: Allows admin to create notifications
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                  description: Unique identifier of the user.
                type:
                  type: string
                  description: Type of notification (e.g., Email, Server, Phone).
                content:
                  type: string
                  description: Content of the notification.
              required:
              - user_id
              - type
              - content
            example:
              user_id: 123
              type: Email
              content: This is a test notification
      responses:
        201:
          description: Notification created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  notification:
                    type: object
                    properties:
                      simple_id:
                        type: integer
                      user_id:
                        type: integer
                      type:
                        type: string
                      content:
                        type: string
                      status:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
        400:
          description: Bad Request - Missing required fields
        500:
          description: Internal Server Error
  /notifications/{user_id}:
    get:
      summary: Get notifications for a specific user
      description: |
        Admin clients can fetch another user's notifications with this route.
        Regular users should prefer `GET /notifications`, which resolves the user from the access token.
      security:
      - BearerAuth: []
      parameters:
      - in: path
        name: user_id
        required: true
        schema:
          type: integer
        description: Unique identifier of the user.
      - in: query
        name: status
        required: false
        schema:
          type: string
          enum:
          - read
          - unread
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
      responses:
        200:
          description: List of notifications for the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListEnvelope'
        500:
          description: Internal Server Error
  /notifications/{simple_id}:
