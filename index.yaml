          type: integer
          example: 120
        failures:
          type: integer
          example: 30
        success_rate_pct:
          type: number
          format: float
          example: 80.0
    DauRow:
      type: object
      properties:
        day_local:
          type: string
          format: date
          example: '2025-08-26'
        dau:
          type: integer
          example: 97
